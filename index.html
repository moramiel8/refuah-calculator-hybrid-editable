    <script>
      (function () {
        try {
          // Capacitor WebView: Android UA is still "Android", but `window.Capacitor` is often
          // not injected yet when this script runs — detect the origin instead.
          var proto = window.location && window.location.protocol;
          var host = (window.location && window.location.hostname) || "";
          if (proto === "capacitor:" || host === "localhost" || host === "127.0.0.1") {
            return;
          }
          var cap = window.Capacitor;
          if (cap && typeof cap.isNativePlatform === "function" && cap.isNativePlatform()) {
            return;
          }
          var ua = navigator.userAgent || "";
          var isAndroid = /Android/i.test(ua);
          var url = String(window.location.href || "");
          var hasBypass = /(?:\?|&)web=1(?:&|$)/.test(url);
          var isAndroidLanding = /\/android(?:\?|#|$)/.test(window.location.pathname || "");
          if (isAndroid && !hasBypass && !isAndroidLanding) {
            window.location.replace("/android");
          }
        } catch (e) {}
      })();
    </script>
